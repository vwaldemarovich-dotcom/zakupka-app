<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Закупка</title>

<style>

*{
    touch-action: manipulation;
    box-sizing: border-box;
}

body{
    font-family: -apple-system, Arial, sans-serif;
    background: #0d0f12;
    color: #fff;
    margin: 0;
    padding: 12px;
    overflow-x: hidden;
}

.wrap{
    display: grid;
    gap: 14px;
    max-width: 100%;
    overflow: hidden;
}

.card{
    background: #13171e;
    border: 1px solid #00ffff;
    box-shadow: 0 0 15px rgba(0,255,255,.15);
    border-radius: 22px;
    padding: 18px;
    overflow: hidden;
}

.titleInput{
    width: 100%;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -1.5px;
    background: linear-gradient(180deg,#11151d,#0d0f12);
    border: 2px solid #00ffff;
    color: #00ffff;
    padding: 24px;
    border-radius: 28px;
    margin-bottom: 18px;
    text-align: center;

    text-shadow:
        0 0 10px rgba(0,255,255,.6);

    box-shadow:
        0 0 25px rgba(0,255,255,.2),
        inset 0 0 15px rgba(0,255,255,.1);
}

.item{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px solid #1f2530;
    gap: 10px;
}

.left{
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
}

.small{
    opacity: .7;
    font-size: 13px;
}

.controls{
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    flex-shrink: 0;
}

button{
    border: none;
    border-radius: 16px;
    background: #00ffff;
    color: #111;
    font-weight: 700;
    font-size: 16px;
    padding: 14px;
    transition: .15s;
    cursor: pointer;

    box-shadow:
        0 0 12px rgba(0,255,255,.3);
}

button:active{
    transform: scale(.97);
}

.controls button{
    min-width: 52px;
    height: 52px;
    padding: 0;
    border-radius: 16px;
    background: #171d26;
    border: 1px solid #222b38;
    color: #00ffff;
    box-shadow: none;
    font-weight: 600;
    font-size: 18px;
}

.controls button:active{
    background: #222b38;
}

.fullBtn{
    width: 100%;
    display: block;
}

.bigBtn{
    min-height: 64px;
    font-size: 18px;
    font-weight: 800;
}

.qty{
    min-width: 34px;
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    color: #fff;
}

.active{
    color: #39ff14;
    font-weight: 700;

    text-shadow:
        0 0 6px rgba(57,255,20,.8),
        0 0 14px rgba(57,255,20,.45);
}

.activeBtn{
    background: #00ffff !important;
    color: #111 !important;
    font-weight: bold !important;
    border: 1px solid #00ffff !important;

    box-shadow:
        0 0 15px rgba(0,255,255,.7),
        inset 0 0 10px rgba(255,255,255,.15) !important;
}

textarea{
    width: 100%;
    height: 260px;
    background: #090b0e;
    color: #fff;
    border: 1px solid #1f2530;
    border-radius: 18px;
    padding: 16px;
    font-family: monospace;
    font-size: 15px;
    line-height: 1.5;
    resize: none;
}

input,
select{
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    border: 1px solid #00ffff;
    background: #11151d;
    color: #fff;
    margin-bottom: 10px;
    font-size: 16px;
    min-width: 0;

    box-shadow:
        inset 0 0 5px rgba(0,255,255,.1);
}

input:focus,
select:focus{
    outline: none;

    box-shadow:
        0 0 10px rgba(0,255,255,.4);
}

.row{
    display: grid;
    grid-template-columns: 1fr 90px 1fr;
    gap: 8px;
}

#categorySelect{
    width: 100%;
    margin-bottom: 14px;
    padding: 14px;
    border-radius: 16px;
    border: 1px solid #00ffff;
    background: #11151d;
    color: #00ffff;
    font-size: 18px;
    font-weight: 700;
}

.categorySettings{
    margin-bottom: 16px;
    padding: 14px;
    background: #0d0f12;
    border-radius: 18px;
    border: 1px solid #1f2530;
}

.editModal{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.85);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 999;
    backdrop-filter: blur(10px);
}

.editBox{
    background: #13171e;
    padding: 20px;
    border-radius: 22px;
    width: 100%;
    max-width: 520px;
    border: 1px solid #00ffff;

    box-shadow:
        0 0 25px rgba(0,255,255,.3);
}

.editBox h3{
    margin-top: 0;
    color: #00ffff;
}

.editButtons{
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
}

.editButtons button{
    width: 100%;
    min-height: 60px;
    font-size: 16px;
    font-weight: 700;
}

.saveBtn{
    background: #00ffff;
    color: #111;
}

.deleteBtn{
    background: #b33939;
    color: #fff;
    box-shadow: none;
}

.closeBtn{
    background:#171d26 !important;
    color:#00ffff !important;
    border:1px solid #222b38 !important;
    box-shadow:none !important;
}

.actionButtons{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
}

.actionButtons button{
    width: 100%;
    min-height: 64px;
    font-size: 18px;
    background: #171d26;
    border: 1px solid #222b38;
    color: #00ffff;
    box-shadow: none;
}

.actionButtons button:nth-child(3),
.actionButtons button:nth-child(4){
    background: #00ffff;
    color: #111;
    font-weight: 700;

    box-shadow:
        0 0 15px rgba(0,255,255,.4);
}

h3{
    font-size: 20px;
    margin-top: 0;
    margin-bottom: 16px;
    color: #00ffff;
}

@media(max-width:480px){

    .titleInput{
        font-size: 24px;
        padding: 18px;
    }

    .controls{
        gap: 6px;
    }

    .controls button{
        min-width: 48px;
        height: 48px;
    }

    .qty{
        font-size: 20px;
        min-width: 24px;
    }

    .row{
        grid-template-columns: 1fr 80px 1fr;
    }

    .actionButtons button{
        font-size: 16px;
        min-height: 58px;
    }

    .editButtons{
        grid-template-columns: 1fr 1fr 1fr;
    }

    .editButtons button{
        min-height: 54px;
        font-size: 14px;
    }

}

</style>
</head>

<body>

<input
id="mainTitle"
class="titleInput"
placeholder="Назва закладу"
oninput="saveMainTitle()"
>

<div class="wrap">

<div class="card">

<h3>Додати продукт</h3>

<input id="name" placeholder="Назва продукту">

<div class="row">

<input id="qty" type="number" value="1">

<select id="unit">
<option value="шт">шт</option>
<option value="ящ">ящ</option>
<option value="кг">кг</option>
<option value="л">л</option>
</select>

<input id="cat" placeholder="Категорія">

</div>

<input id="comment" placeholder="Коментар">

<button
onclick="addProduct()"
class="fullBtn bigBtn">
Додати в базу
</button>

</div>

<div class="card">

<h3>База продуктів</h3>

<select id="categorySelect"></select>

<div id="products"></div>

</div>

<div class="card">

<h3 id="exportTitle">
Текст постачальнику
</h3>

<div class="categorySettings">

<input
id="supplierName"
placeholder="Назва постачальника"
>

<input
id="supplierPhone"
placeholder="+380..."
>

<button
onclick="saveSupplier()"
class="fullBtn bigBtn">
Зберегти постачальника
</button>

</div>

<div class="actionButtons">

<button onclick="downloadBackup()">
⬇️ Зберегти
</button>

<button onclick="document.getElementById('backupInput').click()">
⬆️ Відновити
</button>

<button onclick="sendCurrentSupplier()">
📲 Надіслати у Viber
</button>

<button onclick="clearCategory()">
✓ Готово
</button>

</div>

<input
type="file"
id="backupInput"
accept=".json"
style="display:none"
onchange="uploadBackup(event)"
>

<br><br>

<textarea id="export"></textarea>

</div>

</div>

<div class="editModal" id="editModal">

<div class="editBox">

<h3>Редагування</h3>

<input id="editName" placeholder="Назва">

<div class="row">

<input id="editQty" type="number">

<select id="editUnit">
<option value="шт">шт</option>
<option value="ящ">ящ</option>
<option value="кг">кг</option>
<option value="л">л</option>
</select>

<input id="editCat" placeholder="Категорія">

</div>

<input id="editComment" placeholder="Коментар">

<div class="editButtons">

<button
class="saveBtn"
onclick="saveEdit()">
Зберегти
</button>

<button
class="deleteBtn"
onclick="deleteEdit()">
Видалити
</button>

<button
class="closeBtn"
onclick="closeEdit()">
Закрити
</button>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script>

let products = JSON.parse(localStorage.getItem('zakupka_products') || '[]');
let suppliers = JSON.parse(localStorage.getItem('zakupka_suppliers') || '{}');
let currentCategory = '';
let currentEdit = null;
let sortable = null;

let mainTitle =
localStorage.getItem('zakupka_main_title')
|| '🍴 Dolce Vita Трускавець';

function save(){

    localStorage.setItem(
        'zakupka_products',
        JSON.stringify(products)
    );

    localStorage.setItem(
        'zakupka_suppliers',
        JSON.stringify(suppliers)
    );

}

function saveMainTitle(){

    mainTitle =
    document.getElementById('mainTitle').value
    || 'Закупка';

    localStorage.setItem(
        'zakupka_main_title',
        mainTitle
    );

    generateText();

}

function addProduct(){

    const name =
    document.getElementById('name').value.trim();

    const cat =
    document.getElementById('cat').value.trim();

    if(!name || !cat) return;

    products.push({

        name: name,

        qty: Math.max(
            0,
            Number(
                document.getElementById('qty').value
            ) || 0
        ),

        unit:
        document.getElementById('unit').value,

        cat: cat,

        comment:
        document.getElementById('comment').value,

        active: false

    });

    save();

    render();

    document.getElementById('name').value = '';
    document.getElementById('qty').value = '1';
    document.getElementById('unit').value = 'шт';
    document.getElementById('cat').value = '';
    document.getElementById('comment').value = '';

}

function toggle(i){

    products[i].active =
    !products[i].active;

    save();

    render();

}

function plus(i){

    products[i].qty++;

    save();

    render();

}

function minus(i){

    if(products[i].qty > 0){

        products[i].qty--;

    }

    save();

    render();

}

function openEdit(i){

    currentEdit = i;

    const p = products[i];

    document.getElementById('editName').value = p.name;
    document.getElementById('editQty').value = p.qty;
    document.getElementById('editUnit').value = p.unit;
    document.getElementById('editCat').value = p.cat;
    document.getElementById('editComment').value = p.comment || '';

    document.getElementById('editModal')
    .style.display = 'flex';

}

function closeEdit(){

    document.getElementById('editModal')
    .style.display = 'none';

}

function saveEdit(){

    products[currentEdit].name =
    document.getElementById('editName').value;

    products[currentEdit].qty =
    Math.max(
        0,
        Number(
            document.getElementById('editQty').value
        ) || 0
    );

    products[currentEdit].unit =
    document.getElementById('editUnit').value;

    products[currentEdit].cat =
    document.getElementById('editCat').value;

    products[currentEdit].comment =
    document.getElementById('editComment').value;

    save();

    closeEdit();

    render();

}

function deleteEdit(){

    if(confirm('Видалити продукт?')){

        products.splice(currentEdit,1);

        save();

        closeEdit();

        render();

    }

}

function saveSupplier(){

    suppliers[currentCategory] = {

        name:
        document.getElementById('supplierName').value,

        phone:
        document.getElementById('supplierPhone').value

    };

    save();

    alert('Збережено');

}

function clearCategory(){

    if(confirm('Очистити замовлення та скинути лічильники для цієї категорії?')){

        products.forEach(p=>{

            if(p.cat === currentCategory){

                p.active = false;
                p.qty = 1;

            }

        });

        save();

        render();

    }

}

function downloadBackup(){

    const backup = {
        products,
        suppliers,
        mainTitle
    };

    const blob = new Blob(
        [JSON.stringify(backup,null,2)],
        {type:'application/json'}
    );

    const a =
    document.createElement('a');

    a.href =
    URL.createObjectURL(blob);

    a.download =
    'zakupka-backup.json';

    a.click();

}

function uploadBackup(event){

    const file =
    event.target.files[0];

    if(!file) return;

    const reader =
    new FileReader();

    reader.onload = function(e){

        try{

            const data =
            JSON.parse(e.target.result);

            products =
            data.products || [];

            suppliers =
            data.suppliers || {};

            mainTitle =
            data.mainTitle || 'Закупка';

            save();

            localStorage.setItem(
                'zakupka_main_title',
                mainTitle
            );

            render();

            alert('Backup відновлено');

        }catch(err){

            alert('Помилка backup файлу');

        }

    };

    reader.readAsText(file);

}

function render(){

    const box =
    document.getElementById('products');

    box.innerHTML = '';

    document.getElementById('mainTitle').value =
    mainTitle;

    document.title = mainTitle;

    const grouped = {};

    products.forEach((p,i)=>{

        if(!grouped[p.cat]){

            grouped[p.cat] = [];

        }

        grouped[p.cat].push({p,i});

    });

    const categories =
    Object.keys(grouped);

    if(!currentCategory && categories.length){

        currentCategory = categories[0];

    }

    const select =
    document.getElementById('categorySelect');

    select.innerHTML = '';

    categories.forEach(cat=>{

        const option =
        document.createElement('option');

        option.value = cat;

        option.textContent = cat;

        if(cat === currentCategory){

            option.selected = true;

        }

        select.appendChild(option);

    });

    select.onchange = (e)=>{

        currentCategory = e.target.value;

        render();

    };

    if(suppliers[currentCategory]){

        document.getElementById('supplierName').value =
        suppliers[currentCategory].name || '';

        document.getElementById('supplierPhone').value =
        suppliers[currentCategory].phone || '';

    }else{

        document.getElementById('supplierName').value = '';
        document.getElementById('supplierPhone').value = '';

    }

    if(!grouped[currentCategory]){

        generateText();

        return;

    }

    grouped[currentCategory].forEach(({p,i})=>{

        const row =
        document.createElement('div');

        row.className = 'item';

        row.innerHTML = `

        <div class="left">

            <div class="${p.active ? 'active' : ''}">
                ${p.name}
            </div>

            ${p.comment ? `
            <div
            class="small"
            style="
            color:#00ffff;
            margin-top:4px;
            font-size:13px;
            ">
            💬 ${p.comment}
            </div>
            ` : ''}

            <div class="small">
                ${p.qty} ${p.unit}
            </div>

        </div>

        <div class="controls">

            <button onclick="openEdit(${i})">
            ✏️
            </button>

            <button onclick="minus(${i})">
            −
            </button>

            <div class="qty">
            ${p.qty}
            </div>

            <button onclick="plus(${i})">
            +
            </button>

            <button
            onclick="toggle(${i})"
            class="${p.active ? 'activeBtn' : ''}">
            ✓
            </button>

        </div>

        `;

        box.appendChild(row);

    });

    if(sortable){

        sortable.destroy();

    }

    sortable = new Sortable(box,{

        animation:150,
        delay:200,
        delayOnTouchOnly:true,
        touchStartThreshold:8,

        onEnd:(evt)=>{

            const categoryIndexes = products
            .map((p,index)=>
                p.cat === currentCategory
                ? index
                : null
            )
            .filter(v => v !== null);

            const movedIndex =
            categoryIndexes[evt.oldIndex];

            const targetIndex =
            categoryIndexes[evt.newIndex];

            const movedItem =
            products.splice(movedIndex,1)[0];

            products.splice(
                targetIndex,
                0,
                movedItem
            );

            save();

            render();

        }

    });

    generateText();

}

function generateText(){

    const grouped = {};

    products
    .filter(p=>
        p.active &&
        p.cat === currentCategory
    )
    .forEach(p=>{

        if(!grouped[p.cat]){

            grouped[p.cat] = [];

        }

        grouped[p.cat].push(
            `${p.name} — ${p.qty} ${p.unit}${p.comment ? ' | ' + p.comment : ''}`
        );

    });

    let text =
    'Доброго дня\n\n' +
    mainTitle +
    '\n\n';

    Object.keys(grouped).forEach(cat=>{

        text += grouped[cat].join('\n');

        text += '\n\n';

    });

    document.getElementById('exportTitle')
    .innerText =
    'Текст постачальнику';

    document.getElementById('export').value =
    text.trim();

}

async function sendCurrentSupplier(){

    const supplier =
    suppliers[currentCategory];

    if(!supplier || !supplier.phone){

        alert('Вкажи номер постачальника');

        return;

    }

    const text =
    document.getElementById('export').value;

    try{

        await navigator.clipboard.writeText(text);

        const phone =
        supplier.phone.replace('+','');

        setTimeout(()=>{

            window.location.href =
            `viber://chat?number=${phone}`;

        },300);

    }catch(err){

        alert('Не вдалося скопіювати текст');

    }

}

render();

</script>

</body>
</html>
